<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PottaJoe AI 咖啡推薦系統</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #f5f1eb 0%, #ebe3d8 100%);
            color: #3e2a1f;
        }

        .hero {
            text-align: center;
            padding: 48px 20px 28px;
        }

        .hero h1 {
            margin: 0;
            font-size: 48px;
            font-weight: 800;
            color: #5a3e2b;
        }

        .hero p {
            margin-top: 14px;
            font-size: 18px;
            color: #7a5a46;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 12px 30px rgba(72, 43, 24, 0.10);
            margin-bottom: 28px;
        }

        .section-title {
            margin: 0 0 22px;
            font-size: 32px;
            color: #5a3e2b;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 16px;
        }

        .menu-form {
            margin: 0;
        }

        .menu-btn {
            width: 100%;
            padding: 18px 16px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            background: linear-gradient(135deg, #6f4e37, #94694b);
            color: white;
            font-size: 22px;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(111, 78, 55, 0.22);
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }

        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 24px rgba(111, 78, 55, 0.28);
            opacity: 0.97;
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .score-item {
            background: #fffaf6;
            border: 1px solid #eadfd3;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 6px 14px rgba(72, 43, 24, 0.06);
        }

        .score-label {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #6a4730;
        }

        .score-value {
            font-size: 34px;
            font-weight: 800;
            color: #4f3423;
        }

        .footer-link {
            display: inline-block;
            margin-top: 6px;
            color: #6f4e37;
            font-weight: 700;
            text-decoration: none;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 34px;
            }

            .section-title {
                font-size: 26px;
            }

            .menu-btn {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>☕ PottaJoe AI 咖啡推薦系統</h1>
        <p>用你的喜好，找出最適合你的那杯咖啡</p>
    </div>

    <div class="container">
        <div class="section-card">
            <h2 class="section-title">請選擇你喜歡的口味</h2>

            <div class="button-grid">
                <form class="menu-form" method="post" action="/recommend">
                    <button class="menu-btn" type="submit" name="choice" value="1">1. 濃郁</button>
                </form>

                <form class="menu-form" method="post" action="/recommend">
                    <button class="menu-btn" type="submit" name="choice" value="2">2. 果香</button>
                </form>

                <form class="menu-form" method="post" action="/recommend">
                    <button class="menu-btn" type="submit" name="choice" value="3">3. 堅果</button>
                </form>

                <form class="menu-form" method="post" action="/recommend">
                    <button class="menu-btn" type="submit" name="choice" value="4">4. 花香</button>
                </form>

                <form class="menu-form" method="post" action="/recommend">
                    <button class="menu-btn" type="submit" name="choice" value="5">5. 再推薦一個</button>
                </form>

                <form class="menu-form" method="post" action="/recommend">
                    <button class="menu-btn" type="submit" name="choice" value="6">6. AI 幫我推薦</button>
                </form>
            </div>
        </div>

        <div class="section-card">
            <h2 class="section-title">目前 AI 學到的偏好分數</h2>

            <div class="score-grid">
                <div class="score-item">
                    <div class="score-label">濃郁</div>
                    <div class="score-value">{{ preferences["濃郁"] }}</div>
                </div>
                <div class="score-item">
                    <div class="score-label">果香</div>
                    <div class="score-value">{{ preferences["果香"] }}</div>
                </div>
                <div class="score-item">
                    <div class="score-label">堅果</div>
                    <div class="score-value">{{ preferences["堅果"] }}</div>
                </div>
                <div class="score-item">
                    <div class="score-label">花香</div>
                    <div class="score-value">{{ preferences["花香"] }}</div>
                </div>
            </div>
        </div>

        <a class="footer-link" href="/reset">重設本次推薦紀錄</a>
    </div>
</body>
</html>
